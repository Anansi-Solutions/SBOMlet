name: SBOMlet
description: Generate or gate a third-party licence inventory (SBOM) for the repository.
branding:
  icon: shield
  color: green

inputs:
  mode:
    description: "`check` to gate the committed inventory (default), or `generate` to write it."
    required: false
    default: check
  policy:
    description: "Path to the policy file, relative to the repo root. Defaults to .sbomlet.toml (also auto-discovered when present); omit or point elsewhere for a custom path or no gate."
    required: false
    default: .sbomlet.toml

runs:
  using: composite
  steps:
    # Installs the toolchain SBOMlet pins in its own mise.toml (bun + syft + Task).
    - name: Set up the SBOMlet toolchain
      uses: jdx/mise-action@v4

    - name: Install SBOMlet
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        mise install
        mise x -- bun install --frozen-lockfile

    # The Taskfile is the single interface to the tool, so the action drives it
    # through `task <mode>` rather than the CLI directly. Inputs flow in through the
    # environment (never template interpolation) and become Task vars: REPO_ROOT —
    # off which the Taskfile derives the absolute output paths — and POLICY, added
    # only when the file exists.
    - name: Run SBOMlet
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SBOMLET_MODE: ${{ inputs.mode }}
        SBOMLET_POLICY: ${{ inputs.policy }}
        SBOMLET_WS: ${{ github.workspace }}
      run: |
        vars=("REPO_ROOT=$SBOMLET_WS")
        if [ -n "$SBOMLET_POLICY" ] && [ -f "$SBOMLET_WS/$SBOMLET_POLICY" ]; then
          vars+=("POLICY=$SBOMLET_WS/$SBOMLET_POLICY")
        fi
        mise x -- task "$SBOMLET_MODE" "${vars[@]}"
