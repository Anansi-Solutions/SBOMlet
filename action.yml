name: SBOMlet
description: Generate or gate a third-party licence inventory (SBOM) for the repository.
branding:
  icon: shield
  color: green

inputs:
  mode:
    description: "`check` to gate the committed inventory (default), or `generate` to write it."
    required: false
    default: check
  policy:
    description: "Path to the policy file, relative to the repo root. Defaults to .sbomlet.policy.toml (also auto-discovered when present); omit or point elsewhere for a custom path or no gate."
    required: false
    default: .sbomlet.policy.toml
  docker:
    description: "Set to any non-empty value to build and scan the repository's Dockerfiles and refresh the committed docker OS SBOM before generating. Needs a Docker daemon; pair with `mode: generate`."
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Installs mise itself; the `mise install` below then provisions the
    # toolchain SBOMlet pins in its own mise.toml (the runtime + syft + Task).
    - name: Set up the SBOMlet toolchain
      uses: jdx/mise-action@v4

    # The Taskfile is the single interface to the tool, so the action drives it
    # through `task <mode>` rather than the CLI directly; the task's own install
    # dependency brings in the tool's packages, so there is no separate install
    # step. Inputs flow in through the environment (never template interpolation)
    # and become Task vars: REPO_ROOT — off which the Taskfile derives the
    # absolute output paths — POLICY, added only when the file exists, and
    # DOCKER=1 when the docker input is set.
    - name: Run SBOMlet
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SBOMLET_MODE: ${{ inputs.mode }}
        SBOMLET_POLICY: ${{ inputs.policy }}
        SBOMLET_DOCKER: ${{ inputs.docker }}
        SBOMLET_WS: ${{ github.workspace }}
      run: |
        mise install
        vars=("REPO_ROOT=$SBOMLET_WS")
        if [ -n "$SBOMLET_POLICY" ] && [ -f "$SBOMLET_WS/$SBOMLET_POLICY" ]; then
          vars+=("POLICY=$SBOMLET_WS/$SBOMLET_POLICY")
        fi
        if [ -n "$SBOMLET_DOCKER" ]; then
          vars+=("DOCKER=1")
        fi
        mise x -- task "$SBOMLET_MODE" "${vars[@]}"
