# Taskfile for SBOMlet, the third-party license compliance tool — the single
# interface to the tool for local use, CI, and consumer repositories.
#
# A consumer includes it from their root Taskfile.yml. `flatten: true` exposes the
# tasks unprefixed (`task generate`, `task check`); `dir` is MANDATORY so that
# `mise x -- bun` resolves THIS directory's pinned bun, not the consumer's root:
#
#   includes:
#     sbomlet:
#       taskfile: ./tools/sbomlet/Taskfile.yml
#       dir: ./tools/sbomlet
#       flatten: true
#
# Overridable variables (e.g. `task generate REPO_ROOT=/path/to/repo`):
#   REPO_ROOT       repository to scan              (default: this Taskfile's dir)
#   OUTPUT          THIRD_PARTY_LICENSES.md path    (default: beside REPO_ROOT)
#   NOTICES         THIRD_PARTY_NOTICES.md path     (default: beside REPO_ROOT)
#   POLICY          policy file; --policy is added only when set
#                   (default unset: the tool auto-discovers .sbomlet.policy.toml)
#   CYCLONEDX       CycloneDX export path; --cyclonedx is added only when set
#   IMAGES          space-separated image refs to live-scan (generate-docker-sbom)
#   DISCOVER_ROOT   repo root to discover, build & scan Dockerfiles in (generate-docker-sbom)
#   DOCKERFILES     space-separated Dockerfile paths to build & scan (generate-docker-sbom)
#   DOCKER_OS_SBOM  override the committed SBOM path (default: in the cache dir)
#   INTENSIVE       set (e.g. INTENSIVE=1) to add --intensive to generate: scan
#                   still-unresolved packages' local sources with ScanCode
#                   after registry enrichment (occasional-run cost posture)
#   TITLE           decision title for adr:new
#
# Task runs every command through its own embedded POSIX shell (mvdan/sh), so they
# behave identically on Windows, macOS, and Linux — never PowerShell or cmd. Every
# interpolated variable is piped through `| q` (Task's shellQuote): a value
# containing a space, `$(...)`, or a backtick is quoted into ONE inert argument and
# can never break out into the shell. `task test -- <args>` forwards args verbatim
# to the test runner (a file path, a --test-name-pattern, …).
version: '3'

vars:
  REPO_ROOT: '{{.REPO_ROOT | default .ROOT_DIR}}'
  OUTPUT: '{{.OUTPUT | default (printf "%s/THIRD_PARTY_LICENSES.md" .REPO_ROOT)}}'
  NOTICES: '{{.NOTICES | default (printf "%s/THIRD_PARTY_NOTICES.md" .REPO_ROOT)}}'

tasks:
  generate:
    desc: Generate THIRD_PARTY_LICENSES.md and THIRD_PARTY_NOTICES.md (plus an optional CycloneDX export); commit the outputs
    cmds:
      - mise x -- bun src/cli.ts generate --base-dir {{.USER_WORKING_DIR | q}} --repo-root {{.REPO_ROOT | q}} --output {{.OUTPUT | q}} --notices {{.NOTICES | q}}{{if .POLICY}} --policy {{.POLICY | q}}{{end}}{{if .CYCLONEDX}} --cyclonedx {{.CYCLONEDX | q}}{{end}}{{if .INTENSIVE}} --intensive{{end}}

  check:
    desc: 'CI gate — exit 0 clean, 1 policy violation (beats stale), 2 stale/missing output, 3+ tool error'
    cmds:
      - mise x -- bun src/cli.ts check --base-dir {{.USER_WORKING_DIR | q}} --repo-root {{.REPO_ROOT | q}} --output {{.OUTPUT | q}} --notices {{.NOTICES | q}}{{if .POLICY}} --policy {{.POLICY | q}}{{end}}{{if .CYCLONEDX}} --cyclonedx {{.CYCLONEDX | q}}{{end}}

  verify-cache:
    desc: 'ONLINE cache-integrity audit — re-resolve every committed cache entry against its registry and report divergence from the stored license; run before a release/audit or when the cache changes (needs network). Exit 0 all match, 1 mismatch, 3 tool/network error'
    cmds:
      - mise x -- bun src/cli.ts verify-cache --base-dir {{.USER_WORKING_DIR | q}} --repo-root {{.REPO_ROOT | q}}

  generate-docker-sbom:
    desc: 'MAINTAINER + DOCKER ONLY — produce the committed docker-os.sbom.json. Three lanes: IMAGES="a:1 b:2" scans pre-existing image refs; DOCKERFILES="a/Dockerfile b/Dockerfile" builds & scans an explicit Dockerfile list; DISCOVER_ROOT=. discovers, builds & scans the repo Dockerfiles. NOT part of check (check reads the committed bytes offline).'
    cmds:
      - mise x -- bun src/cli.ts generate-docker-sbom --base-dir {{.USER_WORKING_DIR | q}}{{if .DOCKER_OS_SBOM}} --docker-os-sbom {{.DOCKER_OS_SBOM | q}}{{end}}{{if .DISCOVER_ROOT}} --repo-root {{.DISCOVER_ROOT | q}}{{end}}{{range .DOCKERFILES | default "" | splitList " "}}{{if .}} --dockerfile {{. | q}}{{end}}{{end}}{{range .IMAGES | default "" | splitList " "}}{{if .}} --image {{. | q}}{{end}}{{end}}

  list-dockerfiles:
    desc: "Print the repository's discovered Dockerfile paths (policy-aware), one per line — the Docker-scan workflow's build set"
    silent: true
    cmds:
      - mise x -- bun src/cli.ts generate-docker-sbom --list-dockerfiles --base-dir {{.USER_WORKING_DIR | q}} --repo-root {{.DISCOVER_ROOT | default .ROOT_DIR | q}}{{if .POLICY}} --policy {{.POLICY | q}}{{end}}

  docker-scan:
    desc: 'Discover, build, and scan the repository''s Dockerfiles, then regenerate the inventory — the local equivalent of the docker-scan workflow. DOCKERFILES="a/Dockerfile b/Dockerfile" targets an explicit list instead of discovering. Needs a Docker daemon.'
    cmds:
      - task: generate-docker-sbom
        vars:
          DOCKERFILES: '{{.DOCKERFILES}}'
          DISCOVER_ROOT: '{{if .DOCKERFILES}}{{else}}{{.ROOT_DIR}}{{end}}'
      - task: generate

  quality:
    desc: Quality gate — lint (includes formatting) + typecheck
    cmds:
      - mise x -- bun run lint
      - mise x -- bun run typecheck

  adr:new:
    desc: 'Scaffold an architecture decision record from the MADR template (TITLE="Short decision title")'
    cmds:
      - mise x -- bun scripts/new-adr.ts {{.TITLE | default "" | q}}

  install:
    desc: Install dependencies from the committed lockfile (CI-safe)
    cmds:
      - mise x -- bun install --frozen-lockfile

  test:
    desc: 'Run the test suite (`task test -- <file | --test-name-pattern ...>` forwards args)'
    cmds:
      - mise x -- bun test {{.CLI_ARGS}}
