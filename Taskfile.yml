# Taskfile for SBOMlet, the third-party license compliance tool — the single
# interface to the tool for local use, CI, and consumer repositories.
#
# A consumer includes it from their root Taskfile.yml. `flatten: true` exposes the
# tasks unprefixed (`task generate`, `task check`); `dir` is MANDATORY so that
# `mise x -- bun` resolves THIS directory's pinned bun, not the consumer's root:
#
#   includes:
#     sbomlet:
#       taskfile: ./tools/sbomlet/Taskfile.yml
#       dir: ./tools/sbomlet
#       flatten: true
#
# Overridable variables (e.g. `task generate REPO_ROOT=/path/to/repo`):
#   REPO_ROOT       repository to scan              (default: this Taskfile's dir)
#   OUTPUT          THIRD_PARTY_LICENSES.md path    (default: beside REPO_ROOT)
#   NOTICES         THIRD_PARTY_NOTICES.md path     (default: beside REPO_ROOT)
#   POLICY          policy file; --policy is added only when set
#                   (default unset: the tool auto-discovers .sbomlet.toml)
#   CYCLONEDX       CycloneDX export path; --cyclonedx is added only when set
#   IMAGES          space-separated image refs for generate-docker-sbom
#                   (default: the CLI's built-in image set)
#   DOCKER_OS_SBOM  docker-os-sbom.json path        (default: beside REPO_ROOT)
#   TITLE           decision title for adr:new
#
# Variable values reach the CLI through the ENVIRONMENT, never command-line
# template interpolation, so a value like '$(...)' is inert data, never executed.
version: '3'

vars:
  REPO_ROOT: '{{.REPO_ROOT | default .ROOT_DIR}}'
  OUTPUT: '{{.OUTPUT | default (printf "%s/THIRD_PARTY_LICENSES.md" .REPO_ROOT)}}'
  NOTICES: '{{.NOTICES | default (printf "%s/THIRD_PARTY_NOTICES.md" .REPO_ROOT)}}'

tasks:
  generate:
    desc: Generate THIRD_PARTY_LICENSES.md and THIRD_PARTY_NOTICES.md (plus an optional CycloneDX export); commit the outputs
    env:
      LT_BASE_DIR: '{{.USER_WORKING_DIR}}'
      LT_REPO_ROOT: '{{.REPO_ROOT}}'
      LT_OUTPUT: '{{.OUTPUT}}'
      LT_NOTICES: '{{.NOTICES}}'
      LT_POLICY: '{{.POLICY | default ""}}'
      LT_CYCLONEDX: '{{.CYCLONEDX | default ""}}'
    cmds:
      - mise x -- bun src/cli.ts generate --base-dir "$LT_BASE_DIR" --repo-root "$LT_REPO_ROOT" --output "$LT_OUTPUT" --notices "$LT_NOTICES"{{if .POLICY}} --policy "$LT_POLICY"{{end}}{{if .CYCLONEDX}} --cyclonedx "$LT_CYCLONEDX"{{end}}

  check:
    desc: 'CI gate — exit 0 clean, 1 policy violation (beats stale), 2 stale/missing output, 3+ tool error'
    env:
      LT_BASE_DIR: '{{.USER_WORKING_DIR}}'
      LT_REPO_ROOT: '{{.REPO_ROOT}}'
      LT_OUTPUT: '{{.OUTPUT}}'
      LT_NOTICES: '{{.NOTICES}}'
      LT_POLICY: '{{.POLICY | default ""}}'
      LT_CYCLONEDX: '{{.CYCLONEDX | default ""}}'
    cmds:
      - mise x -- bun src/cli.ts check --base-dir "$LT_BASE_DIR" --repo-root "$LT_REPO_ROOT" --output "$LT_OUTPUT" --notices "$LT_NOTICES"{{if .POLICY}} --policy "$LT_POLICY"{{end}}{{if .CYCLONEDX}} --cyclonedx "$LT_CYCLONEDX"{{end}}

  verify-cache:
    desc: 'ONLINE cache-integrity audit — re-resolve every committed cache entry against its registry and report divergence from the stored license; run before a release/audit or when the cache changes (needs network). Exit 0 all match, 1 mismatch, 3 tool/network error'
    env:
      LT_BASE_DIR: '{{.USER_WORKING_DIR}}'
    cmds:
      - mise x -- bun src/cli.ts verify-cache --base-dir "$LT_BASE_DIR"

  generate-docker-sbom:
    desc: 'MAINTAINER + DOCKER ONLY — scan the image set with syft and write the committed docker-os-sbom.json; NOT part of check (check reads the committed bytes offline)'
    env:
      LT_BASE_DIR: '{{.USER_WORKING_DIR}}'
      LT_DOCKER_OS_SBOM: '{{.DOCKER_OS_SBOM | default (printf "%s/docker-os-sbom.json" .REPO_ROOT)}}'
      LT_IMAGES: '{{.IMAGES | default ""}}'
    cmds:
      # `set --` makes each image ref its own positional operand (no eval, no
      # re-quoting); with no IMAGES override the loop runs zero times and the CLI
      # falls back to its built-in image set.
      - >-
        set -- --base-dir "$LT_BASE_DIR" --docker-os-sbom "$LT_DOCKER_OS_SBOM";
        for ref in $LT_IMAGES; do set -- "$@" --image "$ref"; done;
        mise x -- bun src/cli.ts generate-docker-sbom "$@"

  quality:
    desc: Quality gate — lint + format-check + typecheck
    cmds:
      - mise x -- bun run lint
      - mise x -- bun run format:check
      - mise x -- bun run typecheck

  adr:new:
    desc: 'Scaffold an architecture decision record from the MADR template (TITLE="Short decision title")'
    env:
      LT_ADR_TITLE: '{{.TITLE | default ""}}'
    cmds:
      - mise x -- bun scripts/new-adr.ts

  install:
    desc: Install dependencies from the committed lockfile (CI-safe)
    cmds:
      - mise x -- bun install --frozen-lockfile

  test:
    desc: Run the test suite
    cmds:
      - mise x -- bun test
