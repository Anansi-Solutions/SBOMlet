name: Action

on:
  push:
    branches: [main]
  pull_request:

# Dogfood the action end-to-end against this repository's own committed inventory:
#   - `check` must pass the gate (the committed inventory is current and policy-clean);
#   - `generate` must reproduce the committed files byte-for-byte — a clean working
#     tree afterwards proves the output is deterministic and the inventory is current.
# This gates both the action and SBOMlet's own committed inventory on every push.
jobs:
  dogfood:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gate the committed inventory (check)
        uses: ./
        with:
          mode: check

      - name: Regenerate the inventory (generate)
        uses: ./
        with:
          mode: generate

      - name: Working tree must be unchanged — generate is deterministic
        shell: bash
        run: |
          if ! git diff --quiet; then
            echo "::error::generate changed the committed inventory — regenerate and commit it"
            git --no-pager diff --stat
            exit 1
          fi
          echo "generate reproduced the committed inventory byte-for-byte."
