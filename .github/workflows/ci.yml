name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Quality gate (lint, typecheck)
        run: task quality

      - name: Test
        run: task test
