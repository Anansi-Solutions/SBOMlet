name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Installs the tools pinned in mise.toml — bun, syft, and Task. `task` is
      # then the single interface for every step below.
      - name: Set up mise toolchain
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: task install

      - name: Quality gate (lint, format, typecheck)
        run: task quality

      - name: Test
        run: task test
