name: Verify cache

# The committed enrichment cache (.sbomlet.cache/licenses.cache.json) is the offline source of
# truth that `check` regenerates from. This audits every entry against the live
# registries, plus re-checks any evidence_url permalink an evidence-pinned
# [[clarify]] cites against its repo's current default branch. Runs on a cache
# edit, a policy edit (an evidence_url addition should re-audit immediately),
# and monthly on a schedule -- upstream evidence drift produces no local push,
# so only a schedule can catch it.
on:
  push:
    branches: [main]
    paths:
      - .sbomlet.cache/licenses.cache.json
      - .sbomlet.policy.toml
  schedule:
    - cron: "9 4 3 * *" # monthly; offset from the other scheduled workflows

jobs:
  verify-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up the SBOMlet toolchain
        uses: jdx/mise-action@v4

      - name: Audit the committed cache and cited evidence against the live registries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise x -- task verify:cache
