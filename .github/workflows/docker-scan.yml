name: Docker scan

# Discovers, builds, and scans the repository's Dockerfiles through the tool's
# discovery lane, so the committed SBOM covers application-layer packages too,
# then commits the regenerated artifacts back. Path-filtered because a build-
# and-scan is expensive and only a change to an image source can alter the
# result; the committed artifact paths are deliberately absent from the
# triggers below, so the bot's own commit-back can never re-trigger this
# workflow. See docs/guides/ci-integration.md for the full loop-prevention
# story.
on:
  workflow_dispatch:
    inputs:
      dockerfiles:
        description: "Optional space-separated Dockerfile paths (default: discover all)"
        required: false
        default: ""
  push:
    # "**" matches every branch and excludes tags -- path filters don't apply
    # to tag pushes, so without this the commit-back would target the tag
    # name as a branch.
    branches: ["**"]
    paths: &image-paths
      - "**/Dockerfile*"
      - "**/dockerfile*"
      - "**/DOCKERFILE*"
      - "**/*.dockerfile"
      - "**/*.Dockerfile"
      - "examples/docker-scan/**"
      - ".github/workflows/docker-scan.yml"
  pull_request:
    paths: *image-paths

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          # No step uses authenticated git; the commit-back goes through
          # github-script's own token instead, so never leave the
          # contents:write token in .git/config -- a root-level Dockerfile
          # would otherwise expose it to COPY inside the image under scan.
          persist-credentials: false

      - name: Set up the SBOMlet toolchain
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise x -- task install

      - name: Build and scan the Dockerfiles
        env:
          DOCKERFILES: ${{ inputs.dockerfiles }}
        run: mise x -- task docker-scan DOCKERFILES="$DOCKERFILES"

      - name: Commit regenerated scan artifacts
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await require('./.github/scripts/commit-artifacts.cjs')(
              { github, context, core },
              { message: "chore: refresh docker scan artifacts" },
            );

      - name: Check for uncommitted scan artifacts
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        id: divergence
        with:
          script: |
            await require('./.github/scripts/check-divergence.cjs')({ github, context, core });

      - name: Upload the regenerated scan artifacts
        if: github.event_name == 'pull_request' && steps.divergence.outputs.diverged == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docker-scan-artifacts
          path: ${{ steps.divergence.outputs.changed }}

      - name: Fail on divergence
        if: github.event_name == 'pull_request' && steps.divergence.outputs.diverged == 'true'
        run: exit 1
