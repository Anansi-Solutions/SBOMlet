name: Intensive license scan

# Runs ScanCode against local source trees the registries left unresolved,
# and commits any refreshed cache entries back. This is the occasional,
# deep-scan lane -- source-level detection is slow, so it runs on a schedule
# plus manual dispatch only, never on every push. Usually a no-op: it exists
# for when a future dependency introduces a license the registries can't
# answer. See docs/guides/ci-integration.md for the full story, including why
# a successful commit-back touching .sbomlet.cache/** here is expected and
# does not loop back into this workflow (no push/pull_request trigger below
# for that commit to match).
on:
  schedule:
    - cron: "17 4 1 * *" # monthly: the burn-down set is small and changes slowly
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # ScanCode is slow by design; give it room
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          # No step uses authenticated git; the commit-back goes through
          # github-script's own token instead.
          persist-credentials: false

      - name: Set up the SBOMlet toolchain
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise x -- task install

      - name: Install the license scanner
        # Exact pin, approved and verified against the same version this
        # repository's fixtures were captured with. Ubuntu runner images are
        # expected to preship pipx; if a first live run disproves that, add
        # `pip install pipx` ahead of this step.
        run: pipx install "scancode-toolkit[full]==32.5.0"

      - name: Run the intensive scan
        run: mise x -- task generate INTENSIVE=1

      - name: Commit refreshed cache entries
        uses: actions/github-script@v8
        with:
          script: |
            await require('./.github/scripts/commit-artifacts.cjs')(
              { github, context, core },
              {
                // The scan may only ever touch these paths -- anything else
                // dirty is an earlier step's bug, not something to sweep
                // into this commit.
                scope: [".sbomlet.cache", "THIRD_PARTY_LICENSES.md", "THIRD_PARTY_NOTICES.md"],
                message: "chore: refresh intensive scan artifacts",
              },
            );
