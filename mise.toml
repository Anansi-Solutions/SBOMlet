[tools]
bun = "1.3.14"
# Task runner — the tool's single interface for development, CI, and the consumer
# Taskfile include. Pinned so `task` resolves the same everywhere via mise.
"aqua:go-task/task" = "3.51.1"
# Orchestrated by src/collectors/dockerOs.ts on the generate-docker path ONLY —
# never required on the check path (the committed docker-os-sbom.json is the
# check input). Pinned + checksummed via aqua (the project's no-curl|bash tool
# mechanism). The version MUST equal SYFT_TOOL.version in dockerOs.ts.
"aqua:anchore/syft" = "1.45.1"
