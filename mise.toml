[tools]
bun = "1.3.14"
# `task` is the tool's single interface (local, CI, and the consumer include);
# pinned so it resolves identically everywhere via mise.
"aqua:go-task/task" = "3.51.1"
# syft runs only on the generate-docker-sbom path; check never needs it. The
# version MUST match SYFT_TOOL.version in src/collectors/dockerOs.ts.
"aqua:anchore/syft" = "1.45.1"
