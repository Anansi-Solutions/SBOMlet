[tools]
bun = "1.3.14"
# `task` is the tool's single interface (local, CI, and the consumer include);
# pinned so it resolves identically everywhere via mise.
"aqua:go-task/task" = "3.51.1"
# syft runs only on the generate-docker-sbom path; check never needs it. The
# version MUST match SYFT_TOOL.version in src/collectors/dockerOs.ts.
"aqua:anchore/syft" = "1.45.1"
# scancode-toolkit powers the --intensive lane only (occasional, scheduled
# CI; see docs/explanation/adr/0019-scancode-intensive-collector.md), but it
# is still a DEPENDENCY like every other tool here, so it is pinned and
# installed the same way: `mise install`. The version MUST match
# SCANCODE_TOOL.version in src/enrich/scancode.ts. mise's pipx backend
# strips the `[full]` extra before invoking pipx -- harmless at this
# version, since scancode-toolkit's own metadata already lists `[full]`'s
# two extras-gated deps (typecode[full], extractcode[full]) as unconditional
# requirements. The key keeps `[full]` for intent-documentation and to stay
# correct if a future release ever makes the extra load-bearing again.
"pipx:scancode-toolkit[full]" = "32.5.0"
