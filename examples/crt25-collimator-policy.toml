# Example SBOMlet policy for the open-source Collimator monorepo:
#   https://github.com/crt25/collimator
#
# Collimator is a yarn-workspaces monorepo (backend, frontend, apps/*,
# libraries/*, e2e) with Python notebooks, Terraform, and Docker images. This is
# a realistic starting point — copy it to policy.toml at the repo root and adjust
# as the dependency set evolves. See policy.example.toml for the fully annotated
# schema and every available knob.
#
# Note: the well-known source-available licences (BUSL-1.1, SSPL-1.0, Elastic-2.0)
# are DENIED BY DEFAULT — shipped with the tool — so this policy does not list
# them. Add a [[deny]] entry only for a licence or package the defaults don't cover
# (e.g. the non-SPDX Commons-Clause / Redis RSAL riders, matched by package name).

[document]
title = "Collimator — Third-Party Licenses"

# --- Workspace copyleft suppression --------------------------------------------
# apps/scratch is the Scratch block editor — itself distributed under AGPL-3.0, so
# its in-family AGPL/GPL/LGPL dependencies impose no additional obligation WITHIN
# that workspace. Suppression is per occurrence: the same package used elsewhere
# in a non-AGPL workspace still flags.

[[workspace.copyleft_suppressed]]
path = "apps/scratch"
license = "AGPL-3.0-only"
description = "apps/scratch and its scratch-editor submodule are distributed under AGPL-3.0-only; the bundled scratch-* AGPL dependencies are in-family copyleft and impose no additional obligations within this workspace."

# --- Scope handling ------------------------------------------------------------
# Production occurrences always gate. Dev/build-time and Docker base-image OS
# copyleft are listed, not gated, by default — a build-time tool or the base
# distro carries no distribution obligation. Start unknowns at "warn" while the
# inventory has gaps, then switch to "fail" once it is clean.

[unknown]
handling = "warn"

[dev_dependencies]
handling = "warn"

[os_dependencies]
handling = "warn"
