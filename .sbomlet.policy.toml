# SBOMlet's own licence policy — the tool gates its own dependency inventory.
#
# The shipped source-available denies (BUSL/SSPL/Elastic) apply by default. Beyond
# that: unknown licences fail (the tool must always resolve its own), and a
# build-time-only copyleft downgrades to a warning since it is never redistributed.

[document]
title = "SBOMlet — Third-Party Licenses"

[unknown]
handling = "fail"

[dev_dependencies]
handling = "warn"

[os_dependencies]
handling = "warn"

[docker]
# The Dockerfile-name-pattern walk is intentionally name-only (no content
# sniffing), so it also matches the tool's own source files that merely SHARE
# the "dockerfile.<suffix>" naming convention (the discovery module itself and
# its test). Neither is a real Dockerfile; handing either to docker build would
# abort the run. Excluded from the Docker-scan workflow's build set.
ignore = ["src/collectors/dockerfile.ts", "test/dockerfile.test.ts"]

# The dogfood image (examples/docker-scan) is Alpine-based; its OS layer ships
# unmodified distro packages whose copyleft obligations are met by the distro
# itself (source via Alpine aports; the image aggregates, never derives).
# Reviewed and accepted per package -- version-independent judgments, so the
# rules are unpinned and survive base-image bumps. Each acceptance is scoped
# via `where` to the occurrence it was judged in: this image's OS layer.

[[compatible]]
match = "package"
name = "busybox"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only Alpine base package, shipped unmodified in the image's OS layer; aggregation, source available from Alpine aports."

[[compatible]]
match = "package"
name = "busybox-binsh"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only busybox /bin/sh applet package, same unmodified-Alpine-base reasoning as busybox."

[[compatible]]
match = "package"
name = "ssl_client"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only busybox TLS applet package, same unmodified-Alpine-base reasoning as busybox."

[[compatible]]
match = "package"
name = "apk-tools"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only Alpine package manager, shipped unmodified in the image's OS layer; aggregation, source available from Alpine aports."

[[compatible]]
match = "package"
name = "libapk2"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only apk-tools library package, same unmodified-Alpine-base reasoning as apk-tools."

[[compatible]]
match = "package"
name = "alpine-baselayout"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only Alpine filesystem baselayout, shipped unmodified in the image's OS layer; aggregation, source available from Alpine aports."

[[compatible]]
match = "package"
name = "alpine-baselayout-data"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only baselayout data files, same unmodified-Alpine-base reasoning as alpine-baselayout."

[[compatible]]
match = "package"
name = "scanelf"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "GPL-2.0-only pax-utils ELF scanner, shipped unmodified in the image's OS layer; aggregation, source available from Alpine aports."

[[compatible]]
match = "package"
name = "ca-certificates"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "MPL-2.0 AND MIT; MPL-2.0 is file-level copyleft satisfied by shipping the files unmodified in the OS layer."

[[compatible]]
match = "package"
name = "ca-certificates-bundle"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "MPL-2.0 AND MIT certificate bundle, same file-level-copyleft reasoning as ca-certificates."

[[compatible]]
match = "package"
name = "musl-utils"
where = ["docker:os-packages/examples/docker-scan/Dockerfile"]
reason = "MIT AND BSD-2-Clause AND GPL-2.0-or-later; the GPL part covers unmodified musl utility binaries in the OS layer, aggregation with source available from Alpine aports."

# Two source-vs-registry assessment conflicts, resolved by hand.

[[clarify]]
package = { name = "spdx-ranges", version = "2.1.1" }
expression = "(MIT AND CC-BY-3.0)"
reason = "The npm registry declares (MIT AND CC-BY-3.0); the in-depth scan read only the root LICENSE and saw MIT, missing the CC-BY-3.0 that covers the bundled SPDX range data this package ships. I record the broader registry reading so that data obligation stays on the inventory."

[[clarify]]
package = { name = "uri-js", version = "4.4.1" }
expects = "BSD-2-Clause"
expression = "BSD-2-Clause-Views"
reason = "The scan read the actual LICENSE file and found the BSD-2-Clause-Views variant: plain BSD-2-Clause plus the views-and-conclusions advertising sentence. The registry flattened it to plain BSD-2-Clause. I adopt the precise variant the file carries."
